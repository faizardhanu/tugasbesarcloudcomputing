services:
  # ─────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: hotel_u_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-hotel123}
      MYSQL_DATABASE: ${DB_NAME:-hotel_u}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hotel_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-hotel123}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ─────────────────────────────────────────
  # Express Backend + WebSocket (port 5000)
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    image: hotel_u_app:latest
    container_name: hotel_u_backend
    restart: always
    command: sh docker-entrypoint.sh
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hotel_network

  # ─────────────────────────────────────────
  # Next.js Frontend (port 3000)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    image: hotel_u_app:latest
    container_name: hotel_u_frontend
    restart: always
    command: node server.js
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    networks:
      - hotel_network

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy (port 80 → publik)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hotel_u_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hotel_network

volumes:
  mysql_data:
    driver: local

networks:
  hotel_network:
    driver: bridge
