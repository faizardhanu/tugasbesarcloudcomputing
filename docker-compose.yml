services:
  # ─────────────────────────────────────────
  # Database MySQL
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: hotel_u_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hotel_network

  # ─────────────────────────────────────────
  # Express Backend + WebSocket (port 5000)
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    container_name: hotel_u_backend
    restart: always
    command: sh docker-entrypoint.sh
    env_file: .env
    environment:
      DB_HOST: db          # override agar connect ke container db, bukan localhost
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hotel_network

  # ─────────────────────────────────────────
  # Next.js Frontend (port 3000)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    container_name: hotel_u_frontend
    restart: always
    command: npx next start -p 3000
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - hotel_network

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy (port 80 → publik)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hotel_u_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hotel_network

volumes:
  mysql_data:

networks:
  hotel_network:
    driver: bridge
