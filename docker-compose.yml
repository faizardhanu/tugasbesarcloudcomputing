services:
  # ─────────────────────────────────────────
  # Express Backend + WebSocket (port 5000)
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    image: hotel_u_app:latest
    container_name: hotel_u_backend
    restart: always
    command: sh docker-entrypoint.sh
    env_file: .env
    environment:
      NODE_ENV: production
      # DB_HOST dibaca dari .env (IP VM Database Server GCP)
    networks:
      - hotel_network

  # ─────────────────────────────────────────
  # Next.js Frontend (port 3000)
  # ─────────────────────────────────────────
  frontend:
    image: hotel_u_app:latest
    container_name: hotel_u_frontend
    restart: always
    # Pakai node server.js bukan npx next start
    # npx akan coba download dari npm registry → hang di GCP
    command: node server.js
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    networks:
      - hotel_network

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy (port 80 → publik)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hotel_u_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hotel_network

networks:
  hotel_network:
    driver: bridge
